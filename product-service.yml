server:
  port: 8083
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/productdb
    username: root
    password: ${MYSQL_ROOT_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
