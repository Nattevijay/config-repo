server:
    port: 8084

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/order_db
    username: root
    password: ${MYSQL_ROOT_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka}
